<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0.4" y2="1">
      <stop offset="0%" stop-color="#9b4450"/>
      <stop offset="50%" stop-color="#722f37"/>
      <stop offset="100%" stop-color="#4a1520"/>
    </linearGradient>
    <radialGradient id="warmGlow" cx="0.4" cy="0.3" r="0.55">
      <stop offset="0%" stop-color="#c06070" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#722f37" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="bottomVignette" cx="0.5" cy="0.9" r="0.5">
      <stop offset="0%" stop-color="#2a0a12" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#4a1520" stop-opacity="0"/>
    </radialGradient>
    <filter id="noise">
      <feTurbulence type="fractalNoise" baseFrequency="0.6" numOctaves="3" result="n"/>
      <feColorMatrix type="saturate" values="0" in="n" result="gray"/>
      <feBlend in="SourceGraphic" in2="gray" mode="overlay"/>
    </filter>
    <filter id="glassShadow" x="-15%" y="-10%" width="130%" height="130%">
      <feGaussianBlur stdDeviation="10" result="shadow"/>
      <feMerge><feMergeNode in="shadow"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softBlur">
      <feGaussianBlur stdDeviation="4"/>
    </filter>
    <!-- Wine color -->
    <linearGradient id="wineColor" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e8586a" stop-opacity="0.65"/>
      <stop offset="40%" stop-color="#c03048" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#7a1828" stop-opacity="0.95"/>
    </linearGradient>
    <!-- Glass body gradient — transparent, reflective -->
    <linearGradient id="glassBody" x1="0" y1="0" x2="1" y2="0.5">
      <stop offset="0%" stop-color="white" stop-opacity="0.22"/>
      <stop offset="40%" stop-color="white" stop-opacity="0.08"/>
      <stop offset="70%" stop-color="white" stop-opacity="0.04"/>
      <stop offset="100%" stop-color="white" stop-opacity="0.15"/>
    </linearGradient>
    <linearGradient id="stemGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="white" stop-opacity="0.5"/>
      <stop offset="50%" stop-color="white" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="white" stop-opacity="0.45"/>
    </linearGradient>
  </defs>

  <clipPath id="iconClip"><rect width="512" height="512" rx="112"/></clipPath>

  <g clip-path="url(#iconClip)">
    <!-- Rich layered background -->
    <rect width="512" height="512" fill="url(#bg)"/>
    <rect width="512" height="512" fill="url(#warmGlow)"/>
    <rect width="512" height="512" fill="url(#bottomVignette)"/>
    <rect width="512" height="512" fill="url(#bg)" opacity="0.03" filter="url(#noise)"/>

    <!-- Subtle diagonal light -->
    <line x1="0" y1="400" x2="250" y2="0" stroke="white" stroke-width="100" opacity="0.025"/>
    <line x1="150" y1="512" x2="450" y2="0" stroke="white" stroke-width="60" opacity="0.02"/>

    <!-- Wine glass — large, centered, elegant -->
    <g transform="translate(256 250) rotate(-4)" filter="url(#glassShadow)">

      <!-- Base — wide, stable -->
      <ellipse cx="0" cy="180" rx="70" ry="12" fill="white" opacity="0.55"/>
      <ellipse cx="0" cy="178" rx="65" ry="10" fill="white" opacity="0.3"/>
      <!-- Base top highlight -->
      <ellipse cx="-10" cy="175" rx="35" ry="5" fill="white" opacity="0.2"/>

      <!-- Stem — elegant taper -->
      <rect x="-5.5" y="58" width="11" height="122" rx="5.5" fill="url(#stemGrad)"/>
      <!-- Stem highlight -->
      <rect x="-3" y="65" width="3" height="105" rx="1.5" fill="white" opacity="0.15"/>

      <!-- Bowl — generous, curved -->
      <path d="M-105 -70 Q-112 50 -8 65 L8 65 Q112 50 105 -70 Z"
        fill="url(#glassBody)"/>
      <!-- Bowl outline — subtle, elegant -->
      <path d="M-105 -70 Q-112 50 -8 65 L8 65 Q112 50 105 -70"
        fill="none" stroke="white" stroke-width="2" stroke-opacity="0.4"/>
      <!-- Rim -->
      <ellipse cx="0" cy="-70" rx="105" ry="22" fill="none" stroke="white" stroke-width="2" opacity="0.45"/>
      <ellipse cx="0" cy="-70" rx="105" ry="22" fill="white" opacity="0.06"/>

      <!-- Wine inside bowl -->
      <clipPath id="bowlClip">
        <path d="M-103 -68 Q-110 48 -7 63 L7 63 Q110 48 103 -68 Z"/>
      </clipPath>
      <g clip-path="url(#bowlClip)">
        <!-- Wine surface — tilted slightly for life -->
        <g transform="rotate(3)">
          <ellipse cx="0" cy="-10" rx="100" ry="24" fill="url(#wineColor)"/>
          <!-- Surface highlight — light catching the meniscus -->
          <ellipse cx="-25" cy="-15" rx="50" ry="8" fill="#e8808a" opacity="0.25"/>
          <ellipse cx="30" cy="-8" rx="30" ry="5" fill="#d06070" opacity="0.15"/>
        </g>
        <!-- Wine body below surface -->
        <rect x="-110" y="-8" width="220" height="80" fill="url(#wineColor)"/>
        <!-- Deep wine shadow at bottom of bowl -->
        <ellipse cx="0" cy="50" rx="80" ry="20" fill="#4a0a18" opacity="0.3"/>
      </g>

      <!-- Glass reflections — left edge catch -->
      <path d="M-85 -60 Q-80 -20 -55 25" stroke="white" stroke-width="4" stroke-linecap="round" fill="none" opacity="0.18"/>
      <path d="M-78 -55 Q-74 -25 -52 15" stroke="white" stroke-width="2" stroke-linecap="round" fill="none" opacity="0.1"/>
      <!-- Right subtle reflection -->
      <path d="M80 -45 Q78 -15 65 15" stroke="white" stroke-width="2" stroke-linecap="round" fill="none" opacity="0.08"/>
    </g>

    <!-- Aroma wisps — delicate, rising -->
    <g stroke="white" stroke-linecap="round" fill="none">
      <path d="M225 80 Q220 55 228 30 Q234 10 226 -5" stroke-width="2.5" opacity="0.14"/>
      <path d="M250 75 Q255 48 248 22 Q243 2 250 -12" stroke-width="2" opacity="0.11"/>
      <path d="M275 82 Q280 58 273 35 Q268 15 276 -2" stroke-width="2" opacity="0.12"/>
      <path d="M298 88 Q302 65 296 42" stroke-width="1.5" opacity="0.08"/>
    </g>

    <!-- Tasting note — ! hovering over the glass's right shoulder -->
    <g transform="translate(400 115) rotate(3)">
      <text x="0" y="0" text-anchor="middle" dominant-baseline="central"
        font-family="'Georgia', 'Times New Roman', serif"
        font-size="120" font-weight="700" font-style="italic"
        fill="#e8b8c0" opacity="0.5">!</text>
    </g>
  </g>
</svg>
